<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Re-Life — Login</title>
  <script>
    (function () {
      try {
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        const lowEnd = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)
          || !!(connection && connection.saveData)
          || (typeof navigator.deviceMemory === 'number' && navigator.deviceMemory > 0 && navigator.deviceMemory <= 4);
        if (lowEnd) document.documentElement.classList.add('perf-lite');
      } catch (_) {}
    })();
  </script>
  <script src="/static/js/auth-theme.js"></script>
  <script src="/static/js/auth-lang.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="icon" type="image/png" href="/static/assets/favicon.png">
</head>
<body class="login-page">
<div class="login-shell">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo"><img src="/static/assets/Logo.png" alt="Re-Life" style="width:128px;height:128px"></div>
    </div>

    <form class="login-form" id="login-form">
      <div class="login-field">
        <label class="login-label" for="login-username">Username</label>
        <input
          class="login-input"
          type="text"
          id="login-username"
          placeholder="EcoWarrior"
          autocomplete="username"
          required
          minlength="2"
          maxlength="24"
        >
      </div>
      <div class="login-field">
        <label class="login-label" for="login-password">Password</label>
        <input
          class="login-input"
          type="password"
          id="login-password"
          placeholder="••••••••"
          autocomplete="current-password"
          minlength="4"
        >
      </div>

      <div class="login-error" id="login-error"></div>

      <button class="login-btn login-btn--primary" type="submit" id="login-submit-btn">
        <span>Log In</span>
      </button>

      <div class="login-divider">
        <span>or</span>
      </div>

      <a href="/register" class="login-btn login-btn--ghost" style="text-decoration:none;text-align:center;display:block">
        Create Account
      </a>
    </form>

    <!-- Forgot Password -->
    <div style="text-align:center;margin-top:12px">
      <button class="login-footer-link" onclick="showForgotForm()" id="forgot-link">Forgot Password?</button>
    </div>
    <div class="hidden" id="forgot-form" style="margin-top:8px">
      <div class="login-field">
        <label class="login-label" for="forgot-email">Email Address</label>
        <input class="login-input" type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="login-field hidden" id="forgot-code-field">
        <label class="login-label" for="forgot-code">Reset Code</label>
        <input class="login-input" type="text" id="forgot-code" placeholder="000000" inputmode="numeric" maxlength="6">
      </div>
      <div class="login-field hidden" id="forgot-password-field">
        <label class="login-label" for="forgot-password">New Password</label>
        <input class="login-input" type="password" id="forgot-password" placeholder="••••••••" minlength="8">
      </div>
      <div class="login-error" id="forgot-error"></div>
      <button class="login-btn login-btn--primary btn--full" onclick="handleForgotStep()" id="forgot-btn" style="margin-top:6px">Send Reset Code</button>
    </div>

    <div class="login-footer">
      <div class="auth-theme-control">
        <span class="auth-theme-icon" data-auth-theme-icon aria-hidden="true">🌿</span>
        <select class="auth-theme-select" data-auth-theme-select aria-label="Theme" onchange="applyAuthTheme(this.value)">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="forest">Forest</option>
          <option value="ocean">Ocean</option>
          <option value="sunset">Sunset</option>
          <option value="midnight">Midnight</option>
        </select>
      </div>
      <span class="login-footer-dot">·</span>
      <div class="auth-theme-control">
        <span class="auth-theme-icon" aria-hidden="true">🌐</span>
        <select class="auth-theme-select auth-lang-select" id="login-lang-select" aria-label="Language" onchange="setLoginLang(this.value)">
          <option value="en">English</option>
          <option value="zh_simplified">简体中文</option>
          <option value="zh_traditional">繁體中文</option>
        </select>
      </div>
      <span class="login-footer-dot">·</span>
      <span class="login-footer-text">v1</span>
    </div>
  </div>

</div>

<script type="module" src="/static/supabase.js"></script>
<script>
// Wait for backend storage helper to initialize window.FB
function waitForStorage(cb) {
    if (window.FB) { cb(); return; }
    let tries = 0;
    const timer = setInterval(() => {
        if (window.FB) { clearInterval(timer); cb(); return; }
        if (++tries > 100) { clearInterval(timer); console.error('Storage helper not loaded'); }
    }, 100);
}

let loginLang = AUTH_LANG.normalize(localStorage.getItem('RE_LIFE_LANG') || 'en');

function loginText(en, zhSimplified, zhTraditional) {
    return AUTH_LANG.text(loginLang, en, zhSimplified, zhTraditional);
}

function setText(selector, text) {
    const el = document.querySelector(selector);
    if (el) el.textContent = text;
}

function applyLoginLocale() {
    document.documentElement.lang = AUTH_LANG.htmlLang(loginLang);
    setText('label[for="login-username"]', loginText('Username', '用户名', '用戶名'));
    setText('label[for="login-password"]', loginText('Password', '密码', '密碼'));
    setText('#login-submit-btn', loginText('Log In', '登录', '登入'));
    setText('.login-divider span', loginText('or', '或', '或'));
    setText('a[href="/register"]', loginText('Create Account', '创建账户', '建立帳戶'));
    setText('#forgot-link', loginText('Forgot Password?', '忘记密码？', '忘記密碼？'));
    setText('label[for="forgot-email"]', loginText('Email Address', '电子邮箱', '電子郵箱'));
    setText('label[for="forgot-code"]', loginText('Reset Code', '重置验证码', '重設驗證碼'));
    setText('label[for="forgot-password"]', loginText('New Password', '新密码', '新密碼'));
    setText('#forgot-btn', forgotStep === 1
        ? loginText('Reset Password', '重置密码', '重設密碼')
        : loginText('Send Reset Code', '发送重置码', '傳送重設碼'));
    const langSelect = document.getElementById('login-lang-select');
    if (langSelect) langSelect.value = loginLang;
}

function setLoginLang(lang) {
    loginLang = AUTH_LANG.normalize(lang);
    localStorage.setItem('RE_LIFE_LANG', loginLang);
    applyLoginLocale();
}

function toggleLoginLang() {
    setLoginLang(AUTH_LANG.next(loginLang));
}

waitForStorage(() => {
    document.getElementById('login-form').addEventListener('submit', handleLogin);
});

async function handleLogin(e) {
    e.preventDefault();
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-submit-btn');
    errorEl.textContent = '';
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username) {
        errorEl.textContent = loginText('Please enter a username', '请输入用户名', '請輸入用戶名');
        return;
    }
    if (!password) {
        errorEl.textContent = loginText('Please enter a password', '请输入密码', '請輸入密碼');
        return;
    }
    btn.textContent = '...';
    try {
        await window.FB.loginUser(username, password);
        window.location.replace('/');
    } catch (err) {
        const errorCode = err.payload?.error;
        if (errorCode === 'INVALID_CREDENTIALS') {
            errorEl.textContent = loginText('Invalid username or password.', '用户名或密码无效。', '用戶名或密碼無效。');
        } else {
            errorEl.textContent = loginText('Login failed. Try again.', '登录失败，请重试。', '登入失敗，請重試。');
        }
        console.error('Login error:', err);
    }
    btn.textContent = loginText('Log In', '登录', '登入');
}

// ── Forgot Password Flow ────────────────────────────────────────────
let forgotStep = 0; // 0=enter email, 1=enter code+password
let forgotEmail = '';

applyLoginLocale();

function showForgotForm() {
    document.getElementById('forgot-form').classList.toggle('hidden');
    forgotStep = 0;
    document.getElementById('forgot-code-field').classList.add('hidden');
    document.getElementById('forgot-password-field').classList.add('hidden');
    document.getElementById('forgot-btn').textContent = loginText('Send Reset Code', '发送重置码', '傳送重設碼');
    document.getElementById('forgot-error').textContent = '';
}

async function handleForgotStep() {
    const errorEl = document.getElementById('forgot-error');
    const btn = document.getElementById('forgot-btn');
    errorEl.textContent = '';

    if (forgotStep === 0) {
        const email = document.getElementById('forgot-email').value.trim();
        if (!email) { errorEl.textContent = loginText('Please enter your email', '请输入你的电子邮箱', '請輸入你的電子郵箱'); return; }
        btn.textContent = loginText('Sending...', '发送中...', '傳送中...');
        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ email }),
            });
            const data = await res.json();
            if (data.ok) {
                forgotEmail = email;
                forgotStep = 1;
                document.getElementById('forgot-code-field').classList.remove('hidden');
                document.getElementById('forgot-password-field').classList.remove('hidden');
                btn.textContent = 'Reset Password';
                if (data.dev_code) {
                    errorEl.textContent = 'DEV: ' + data.dev_code;
                    errorEl.style.color = '#047857';
                }
            } else {
                errorEl.textContent = data.error || loginText('Failed to send code', '发送验证码失败', '傳送驗證碼失敗');
            }
        } catch (_) { errorEl.textContent = loginText('Network error', '网络错误', '網絡錯誤'); }
        btn.textContent = loginText('Send Reset Code', '发送重置码', '傳送重設碼');
    } else {
        const code = document.getElementById('forgot-code').value.trim();
        const password = document.getElementById('forgot-password').value;
        if (!code || code.length !== 6) { errorEl.textContent = loginText('Enter the 6-digit code', '请输入 6 位验证码', '請輸入 6 位驗證碼'); return; }
        if (!password || password.length < 8) { errorEl.textContent = loginText('Password must be 8+ chars', '密码至少需要 8 个字符', '密碼至少需要 8 個字符'); return; }
        btn.textContent = loginText('Resetting...', '重置中...', '重設中...');
        try {
        const res = await fetch('/api/reset-password', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email: forgotEmail, code, password }),
        });
        const data = await res.json();
        if (data.ok) {
            errorEl.textContent = loginText('Password reset! You can now log in.', '密码已重置，现在可以登录。', '密碼已重設，現在可以登入。');
            errorEl.style.color = '#047857';
            btn.textContent = loginText('Done', '完成', '完成');
                btn.disabled = true;
            } else {
                errorEl.textContent = data.error || loginText('Invalid code', '验证码无效', '驗證碼無效');
            }
        } catch (err) {
            errorEl.textContent = loginText('Reset failed: ', '重置失败：', '重設失敗：') + (err.message || loginText('try again', '请重试', '請重試'));
            console.error(err);
        }
        btn.textContent = loginText('Reset Password', '重置密码', '重設密碼');
    }
}

function waitForStoragePromise() {
    return new Promise((resolve, reject) => {
        if (window.FB) return resolve();
        let tries = 0;
        const timer = setInterval(() => {
            if (window.FB) { clearInterval(timer); resolve(); return; }
            if (++tries > 100) { clearInterval(timer); reject(new Error('Storage helper not loaded')); }
        }, 100);
    });
}
</script>
</body>
</html>
