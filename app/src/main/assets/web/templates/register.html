<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Re-Life — Create Account</title>
  <script>
    (function () {
      try {
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        const lowEnd = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)
          || !!(connection && connection.saveData)
          || (typeof navigator.deviceMemory === 'number' && navigator.deviceMemory > 0 && navigator.deviceMemory <= 4);
        if (lowEnd) document.documentElement.classList.add('perf-lite');
      } catch (_) {}
    })();
  </script>
  <script src="/static/js/auth-theme.js"></script>
  <script src="/static/js/auth-lang.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="icon" type="image/png" href="/static/assets/favicon.png">
  <style>
    .step { display: none; }
    .step.active { display: block; }
    .code-input {
      width: 100%;
      padding: 14px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 8px;
      font-family: monospace;
      border: 2px solid var(--color-gray-200);
      border-radius: var(--radius-sm);
      background: var(--color-gray-50);
      color: var(--color-gray-800);
      outline: none;
    }
    .code-input:focus {
      border-color: var(--color-primary-mid);
      box-shadow: 0 0 0 3px rgba(90, 154, 107, 0.15);
    }
    .verify-hint {
      font-size: 11px;
      color: var(--color-gray-500);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body class="login-page">
<div class="login-shell">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo"><img src="/static/assets/Logo.png" alt="Re-Life" style="width:128px;height:128px"></div>
    </div>

    <!-- STEP 1: Register form -->
    <div class="step active" id="step-register">
      <form class="login-form" id="register-form" onsubmit="handleRegister(event)">
        <div class="login-field">
          <label class="login-label" for="reg-username">Choose Username</label>
          <input class="login-input" type="text" id="reg-username" placeholder="EcoWarrior" autocomplete="off" required minlength="2" maxlength="24">
        </div>
        <div class="login-field">
          <label class="login-label" for="reg-email">Email Address</label>
          <input class="login-input" type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="login-field">
          <label class="login-label" for="reg-password">Choose Password</label>
          <input class="login-input" type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" required minlength="8">
        </div>
        <div class="login-field">
          <label class="login-label" for="reg-password-confirm">Confirm Password</label>
          <input class="login-input" type="password" id="reg-password-confirm" placeholder="••••••••" autocomplete="new-password" required minlength="8">
        </div>
        <div class="login-error" id="register-error"></div>
        <button class="login-btn login-btn--primary" type="submit" id="register-submit-btn">
          <span>Send Verification Code</span>
        </button>
      </form>
    </div>

    <!-- STEP 2: Verify code -->
    <div class="step" id="step-verify">
      <form class="login-form" id="verify-form" onsubmit="handleVerify(event)">
        <div class="login-field">
          <label class="login-label">Verification Code</label>
          <input class="code-input" type="text" id="verify-code" placeholder="000000" inputmode="numeric" maxlength="6" minlength="6" autocomplete="one-time-code" required>
        </div>
        <div class="verify-hint" id="verify-hint"></div>
        <div class="login-error" id="verify-error"></div>
        <button class="login-btn login-btn--primary" type="submit" id="verify-submit-btn">
          <span>Verify & Create Account</span>
        </button>
        <button class="login-btn login-btn--ghost" type="button" onclick="goBack()" style="margin-top:0">
          ← Try a different email
        </button>
      </form>
    </div>

    <div class="login-divider" style="margin-top:12px">
      <span>or</span>
    </div>

    <a href="/login" class="login-btn login-btn--ghost" style="text-decoration:none;text-align:center;display:block">
      ← Back to Login
    </a>

    <div class="login-footer">
      <div class="auth-theme-control">
        <span class="auth-theme-icon" data-auth-theme-icon aria-hidden="true">🌿</span>
        <select class="auth-theme-select" data-auth-theme-select aria-label="Theme" onchange="applyAuthTheme(this.value)">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="forest">Forest</option>
          <option value="ocean">Ocean</option>
          <option value="sunset">Sunset</option>
          <option value="midnight">Midnight</option>
        </select>
      </div>
      <span class="login-footer-dot">·</span>
      <div class="auth-theme-control">
        <span class="auth-theme-icon" aria-hidden="true">🌐</span>
        <select class="auth-theme-select auth-lang-select" id="register-lang-select" aria-label="Language" onchange="setRegisterLang(this.value)">
          <option value="en">English</option>
          <option value="zh_simplified">简体中文</option>
          <option value="zh_traditional">繁體中文</option>
        </select>
      </div>
      <span class="login-footer-dot">·</span>
      <span class="login-footer-text">v1</span>
    </div>
  </div>

</div>

<script type="module" src="/static/supabase.js"></script>
<script>
let registerLang = AUTH_LANG.normalize(localStorage.getItem('RE_LIFE_LANG') || 'en');
let pendingEmail = '';
let pendingUsername = '';
let pendingPassword = '';

function registerText(en, zhSimplified, zhTraditional) {
    return AUTH_LANG.text(registerLang, en, zhSimplified, zhTraditional);
}

function setText(selector, text) {
    const el = document.querySelector(selector);
    if (el) el.textContent = text;
}

function applyRegisterLocale() {
    document.documentElement.lang = AUTH_LANG.htmlLang(registerLang);
    setText('label[for="reg-username"]', registerText('Choose Username', '选择用户名', '選擇用戶名'));
    setText('label[for="reg-email"]', registerText('Email Address', '电子邮箱', '電子郵箱'));
    setText('label[for="reg-password"]', registerText('Choose Password', '选择密码', '選擇密碼'));
    setText('label[for="reg-password-confirm"]', registerText('Confirm Password', '确认密码', '確認密碼'));
    setText('#register-submit-btn', registerText('Send Verification Code', '发送验证码', '傳送驗證碼'));
    setText('label.login-label:not([for])', registerText('Verification Code', '验证码', '驗證碼'));
    setText('#verify-submit-btn', registerText('Verify & Create Account', '验证并创建账户', '驗證並建立帳戶'));
    setText('button[onclick="goBack()"]', registerText('← Try a different email', '← 使用其他邮箱', '← 使用其他電子郵箱'));
    setText('.login-divider span', registerText('or', '或', '或'));
    setText('a[href="/login"]', registerText('← Back to Login', '← 返回登录', '← 返回登入'));
    const langSelect = document.getElementById('register-lang-select');
    if (langSelect) langSelect.value = registerLang;
    const titleEl = document.getElementById('step-title');
    if (titleEl) {
        titleEl.textContent = document.getElementById('step-verify')?.classList.contains('active')
            ? registerText('Verify your email', '验证你的电子邮箱', '驗證你的電子郵箱')
            : registerText('Create your eco account', '创建你的环保账户', '建立你的環保帳戶');
    }
    if (pendingEmail && document.getElementById('step-verify')?.classList.contains('active')) {
        document.getElementById('verify-hint').textContent =
            registerText('We sent a 6-digit code to ', '我们已发送 6 位验证码到 ', '我們已傳送 6 位驗證碼到 ') + pendingEmail;
    }
}

function setRegisterLang(lang) {
    registerLang = AUTH_LANG.normalize(lang);
    localStorage.setItem('RE_LIFE_LANG', registerLang);
    applyRegisterLocale();
}

function toggleRegisterLang() {
    setRegisterLang(AUTH_LANG.next(registerLang));
}

function showStep(id) {
    const steps = document.querySelectorAll('.step');
    steps.forEach(s => { s.style.opacity = '0'; s.classList.remove('active'); });
    const activeStep = document.getElementById(id);
    activeStep.classList.add('active');
    setTimeout(() => { activeStep.style.opacity = '1'; }, 50);
    const titleEl = document.getElementById('step-title');
    if (titleEl) {
        if (id === 'step-verify') {
            titleEl.textContent = registerText('Verify your email', '验证你的电子邮箱', '驗證你的電子郵箱');
            document.getElementById('verify-hint').textContent =
                registerText('We sent a 6-digit code to ', '我们已发送 6 位验证码到 ', '我們已傳送 6 位驗證碼到 ') + pendingEmail;
        } else {
            titleEl.textContent = registerText('Create your eco account', '创建你的环保账户', '建立你的環保帳戶');
        }
    }
}

function goBack() {
    showStep('step-register');
}

function waitForStorage(cb) {
    if (window.FB) { cb(); return; }
    let tries = 0;
    const timer = setInterval(() => {
        if (window.FB) { clearInterval(timer); cb(); return; }
        if (++tries > 100) { clearInterval(timer); console.error('Storage helper not loaded'); }
    }, 100);
}

async function handleRegister(e) {
    e.preventDefault();
    const errorEl = document.getElementById('register-error');
    const btn = document.getElementById('register-submit-btn');
    errorEl.textContent = '';

    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const passwordConfirm = document.getElementById('reg-password-confirm').value;

    if (!username || username.length < 2) {
        errorEl.textContent = registerText('Username must be at least 2 characters', '用户名至少需要 2 个字符', '用戶名至少需要 2 個字符');
        return;
    }
    if (password !== passwordConfirm) {
        errorEl.textContent = registerText('Passwords do not match', '两次输入的密码不一致', '兩次輸入的密碼不一致');
        return;
    }
    if (!email || !email.includes('@') || !email.includes('.')) {
        errorEl.textContent = registerText('Please enter a valid email address', '请输入有效的电子邮箱', '請輸入有效的電子郵箱');
        return;
    }
    if (!password || password.length < 8) {
        errorEl.textContent = registerText('Password must be at least 8 characters', '密码至少需要 8 个字符', '密碼至少需要 8 個字符');
        return;
    }

    btn.textContent = registerText('Sending...', '发送中...', '傳送中...');
    try {
        const res = await fetch('/api/send-verification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.ok) {
            pendingEmail = email;
            pendingUsername = username;
            pendingPassword = password;
            showStep('step-verify');
            // Show dev code if email delivery is unavailable
            if (data.dev_code) {
                document.getElementById('verify-hint').textContent =
                    'DEV MODE — code: ' + data.dev_code + ' (sent to ' + pendingEmail + ')';
            } else {
                document.getElementById('verify-hint').textContent =
                    registerText('We sent a 6-digit code to ', '我们已发送 6 位验证码到 ', '我們已傳送 6 位驗證碼到 ') + pendingEmail;
            }
            document.getElementById('verify-code').focus();
        } else {
            errorEl.textContent = data.error || registerText('Failed to send verification code', '发送验证码失败', '傳送驗證碼失敗');
        }
    } catch (err) {
        errorEl.textContent = registerText('Network error — check your connection', '网络错误，请检查连接', '網絡錯誤，請檢查連線');
        console.error(err);
    }
    btn.textContent = registerText('Send Verification Code', '发送验证码', '傳送驗證碼');
}

async function handleVerify(e) {
    e.preventDefault();
    const errorEl = document.getElementById('verify-error');
    const btn = document.getElementById('verify-submit-btn');
    errorEl.textContent = '';

    const code = document.getElementById('verify-code').value.trim();
    if (!code || code.length !== 6) {
        errorEl.textContent = registerText('Please enter the 6-digit code', '请输入 6 位验证码', '請輸入 6 位驗證碼');
        return;
    }

    btn.textContent = registerText('Verifying...', '验证中...', '驗證中...');
    try {
        await waitForStoragePromise();
        await window.FB.createUser(pendingUsername, pendingPassword, pendingEmail, code);
        window.location.replace('/login');
    } catch (err) {
        const errorCode = err.payload?.error;
        if (errorCode === 'USERNAME_TAKEN') {
            errorEl.textContent = registerText('Username already taken', '用户名已被使用', '用戶名已被使用');
        } else if (errorCode === 'EMAIL_TAKEN') {
            errorEl.textContent = registerText('This email is already registered', '此电子邮箱已被注册', '此電子郵箱已被註冊');
        } else if (errorCode === 'INVALID_OR_EXPIRED_CODE') {
            errorEl.textContent = registerText('Invalid or expired code', '验证码无效或已过期', '驗證碼無效或已過期');
        } else {
            errorEl.textContent = registerText('Registration failed', '注册失败', '註冊失敗');
        }
        console.error(err);
    }
    btn.textContent = registerText('Verify & Create Account', '验证并创建账户', '驗證並建立帳戶');
}

function waitForStoragePromise() {
    return new Promise((resolve, reject) => {
        if (window.FB) return resolve();
        let tries = 0;
        const timer = setInterval(() => {
            if (window.FB) { clearInterval(timer); resolve(); return; }
            if (++tries > 100) { clearInterval(timer); reject(new Error('Storage helper not loaded')); }
        }, 100);
    });
}

applyRegisterLocale();
</script>
</body>
</html>
